<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generative Pattern Sketchpad</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #1a1a2e;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 12px 24px;
      background: #0f3460;
      border-bottom: 2px solid #e94560;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 1.1rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 700;
    }
    header p {
      font-size: 0.72rem;
      color: #99aacc;
      margin-top: 2px;
    }

    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ---- Controls Panel ---- */
    .controls {
      width: 250px;
      min-width: 250px;
      background: #16213e;
      padding: 18px 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
      border-right: 1px solid #0f3460;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .control-group label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #7799cc;
      font-weight: 600;
    }

    /* Mode toggle */
    .toggle-row {
      display: flex;
      border-radius: 5px;
      overflow: hidden;
      border: 1px solid #e94560;
    }
    .toggle-row button {
      flex: 1;
      padding: 8px 6px;
      background: transparent;
      color: #aac;
      border: none;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      transition: background 0.15s, color 0.15s;
      letter-spacing: 0.5px;
    }
    .toggle-row button.active {
      background: #e94560;
      color: #fff;
    }
    .toggle-row button:not(.active):hover {
      background: #1a2a4a;
    }

    /* Dropdowns */
    select {
      width: 100%;
      background: #0f3460;
      border: 1px solid #2a4a7a;
      color: #fff;
      padding: 7px 8px;
      border-radius: 4px;
      font-size: 0.82rem;
      cursor: pointer;
    }
    select:focus { outline: 1px solid #e94560; }

    /* Sliders */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .slider-row input[type="range"] {
      flex: 1;
      accent-color: #e94560;
      cursor: pointer;
    }
    .slider-row .val {
      font-size: 0.8rem;
      min-width: 26px;
      text-align: right;
      color: #e94560;
      font-weight: 700;
    }

    /* Background toggle */
    .bg-row {
      display: flex;
      gap: 8px;
    }
    .bg-row button {
      flex: 1;
      padding: 7px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
      border: 1px solid #2a4a7a;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .bg-row .btn-dark  { background: #111827; color: #fff; }
    .bg-row .btn-light { background: #f0f0f8; color: #111; }
    .bg-row button.active { border-color: #e94560; box-shadow: 0 0 0 1px #e94560; }

    /* Action buttons */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: auto;
      padding-top: 8px;
    }
    .btn {
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-randomize {
      background: #0f3460;
      color: #fff;
      border: 1px solid #e94560;
    }
    .btn-randomize:hover { background: #1a4a8a; }
    .btn-export {
      background: #e94560;
      color: #fff;
    }
    .btn-export:hover { background: #c73652; }

    /* Canvas area */
    .canvas-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      overflow: hidden;
    }
    #canvas-container canvas { display: block; }

    /* Divider */
    .divider {
      height: 1px;
      background: #1f3a6a;
      margin: 2px 0;
    }
  </style>
</head>
<body>

<header>
  <h1>Generative Pattern Sketchpad</h1>
  <p>Configure your pattern, then export as a standalone HTML file</p>
</header>

<div class="workspace">

  <div class="controls">

    <div class="control-group">
      <label>Pattern Mode</label>
      <div class="toggle-row">
        <button class="active" id="btn-geo" onclick="setMode('geometric')">Geometric</button>
        <button id="btn-part" onclick="setMode('particle')">Particles</button>
      </div>
    </div>

    <div class="control-group">
      <label>Shape</label>
      <select id="sel-shape" onchange="params.shape = this.value">
        <option value="circle">Circle</option>
        <option value="square">Square</option>
        <option value="triangle">Triangle</option>
      </select>
    </div>

    <div class="control-group">
      <label>Color Palette</label>
      <select id="sel-palette" onchange="params.palette = this.value">
        <option value="warm">Warm — Reds &amp; Oranges</option>
        <option value="cool">Cool — Blues &amp; Greens</option>
        <option value="mono">Monochrome</option>
        <option value="rainbow">Rainbow</option>
        <option value="neon">Neon</option>
      </select>
    </div>

    <div class="divider"></div>

    <div class="control-group">
      <label>Density</label>
      <div class="slider-row">
        <input type="range" id="sl-density" min="9" max="100" value="36"
          oninput="params.density=+this.value; document.getElementById('v-density').textContent=this.value; if(params.mode==='particle') window.reinitParticles();">
        <span class="val" id="v-density">36</span>
      </div>
    </div>

    <div class="control-group">
      <label>Speed</label>
      <div class="slider-row">
        <input type="range" id="sl-speed" min="1" max="10" value="3" step="1"
          oninput="params.speed=+this.value; document.getElementById('v-speed').textContent=this.value;">
        <span class="val" id="v-speed">3</span>
      </div>
    </div>

    <div class="control-group">
      <label>Size</label>
      <div class="slider-row">
        <input type="range" id="sl-size" min="5" max="60" value="20"
          oninput="params.size=+this.value; document.getElementById('v-size').textContent=this.value;">
        <span class="val" id="v-size">20</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="control-group">
      <label>Background</label>
      <div class="bg-row">
        <button class="btn-dark active" id="btn-dark" onclick="setBg('dark')">Dark</button>
        <button class="btn-light" id="btn-light" onclick="setBg('light')">Light</button>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-randomize" onclick="randomize()">&#9680; Randomize</button>
      <button class="btn btn-export" onclick="exportHTML()">&#8659; Export HTML</button>
    </div>

  </div><!-- /controls -->

  <div class="canvas-wrapper">
    <div id="canvas-container"></div>
  </div>

</div><!-- /workspace -->

<script>
// ── Palettes ──────────────────────────────────────────────────────────────────
const PALETTES = {
  warm:    ['#FF6B6B','#FF8E53','#FFC300','#FF5733','#FF9A3C','#F7971E'],
  cool:    ['#4ECDC4','#45B7D1','#96CEB4','#2196F3','#00BCD4','#26C6DA'],
  mono:    ['#FFFFFF','#DDDDDD','#AAAAAA','#666666','#EEEEEE','#999999'],
  rainbow: ['#FF0000','#FF7F00','#FFFF00','#00CC44','#0066FF','#8800FF'],
  neon:    ['#FF00FF','#00FFFF','#FF0080','#00FF88','#FFFF00','#FF4081']
};

// ── Shared state ──────────────────────────────────────────────────────────────
const params = {
  mode:    'geometric',
  shape:   'circle',
  palette: 'warm',
  density: 36,
  speed:   3,
  size:    20,
  bgDark:  true
};

// ── UI helpers ────────────────────────────────────────────────────────────────
function setMode(mode) {
  params.mode = mode;
  document.getElementById('btn-geo').classList.toggle('active',  mode === 'geometric');
  document.getElementById('btn-part').classList.toggle('active', mode === 'particle');
  if (mode === 'particle' && window.reinitParticles) window.reinitParticles();
}

function setBg(bg) {
  params.bgDark = (bg === 'dark');
  document.getElementById('btn-dark').classList.toggle('active',  bg === 'dark');
  document.getElementById('btn-light').classList.toggle('active', bg === 'light');
}

function randomize() {
  const pick = arr => arr[Math.floor(Math.random() * arr.length)];
  const rInt = (lo, hi) => Math.floor(Math.random() * (hi - lo + 1)) + lo;

  const newMode  = pick(['geometric', 'particle']);
  const newShape = pick(['circle', 'square', 'triangle']);
  const newPal   = pick(Object.keys(PALETTES));
  const newBg    = pick(['dark', 'light']);

  params.shape   = newShape;
  params.palette = newPal;
  params.density = rInt(9, 100);
  params.speed   = rInt(1, 10);
  params.size    = rInt(5, 55);

  document.getElementById('sel-shape').value          = newShape;
  document.getElementById('sel-palette').value        = newPal;
  document.getElementById('sl-density').value         = params.density;
  document.getElementById('v-density').textContent    = params.density;
  document.getElementById('sl-speed').value           = params.speed;
  document.getElementById('v-speed').textContent      = params.speed;
  document.getElementById('sl-size').value            = params.size;
  document.getElementById('v-size').textContent       = params.size;

  setMode(newMode);
  setBg(newBg);
}

// ── p5.js sketch (instance mode) ─────────────────────────────────────────────
new p5(function(p) {
  let particles = [];

  function initParticles() {
    particles = [];
    for (let i = 0; i < params.density; i++) {
      particles.push({
        x:     p.random(p.width),
        y:     p.random(p.height),
        vx:    p.random(-0.5, 0.5) + (Math.random() < 0.5 ? 1 : -1),
        vy:    p.random(-0.5, 0.5) + (Math.random() < 0.5 ? 1 : -1),
        ci:    Math.floor(p.random(6)),
        phase: p.random(p.TWO_PI)
      });
    }
  }

  // expose so UI can trigger re-init
  window.reinitParticles = initParticles;

  p.setup = function() {
    const cnv = p.createCanvas(580, 580);
    cnv.parent('canvas-container');
    p.angleMode(p.RADIANS);
    initParticles();
  };

  p.draw = function() {
    const bg = params.bgDark ? p.color(18, 18, 28) : p.color(242, 242, 250);
    p.background(bg);
    params.mode === 'geometric' ? drawGeometric() : drawParticles();
  };

  function drawGeometric() {
    const pal  = PALETTES[params.palette];
    const cols = Math.max(1, Math.round(Math.sqrt(params.density)));
    const rows = cols;
    const sx   = p.width  / (cols + 1);
    const sy   = p.height / (rows + 1);
    p.noStroke();

    for (let i = 0; i < cols; i++) {
      for (let j = 0; j < rows; j++) {
        const phase = (i * cols + j) * 0.4;
        const pulse = params.size * (0.55 + 0.45 * Math.sin(p.frameCount * params.speed * 0.018 + phase));
        const col   = pal[(i + j) % pal.length];
        p.fill(col);
        p.push();
        p.translate(sx * (i + 1), sy * (j + 1));
        p.rotate(p.frameCount * params.speed * 0.01 + phase);
        drawShape(pulse);
        p.pop();
      }
    }
  }

  function drawParticles() {
    const pal = PALETTES[params.palette];
    const spd = params.speed * 0.35;
    p.noStroke();

    for (const pt of particles) {
      pt.x += pt.vx * spd;
      pt.y += pt.vy * spd;
      if (pt.x < 0)        pt.x = p.width;
      if (pt.x > p.width)  pt.x = 0;
      if (pt.y < 0)        pt.y = p.height;
      if (pt.y > p.height) pt.y = 0;

      const pulse = params.size * (0.65 + 0.35 * Math.sin(p.frameCount * 0.04 + pt.phase));
      p.fill(pal[pt.ci % pal.length]);
      p.push();
      p.translate(pt.x, pt.y);
      p.rotate(p.frameCount * params.speed * 0.012 + pt.phase);
      drawShape(pulse);
      p.pop();
    }
  }

  function drawShape(s) {
    if (params.shape === 'circle') {
      p.ellipse(0, 0, s, s);
    } else if (params.shape === 'square') {
      p.rectMode(p.CENTER);
      p.rect(0, 0, s, s);
    } else {
      const h = s * 0.866;
      p.triangle(0, -h * 0.67, s * 0.5, h * 0.33, -s * 0.5, h * 0.33);
    }
  }

});

// ── Export ────────────────────────────────────────────────────────────────────
function exportHTML() {
  const pal  = JSON.stringify(PALETTES[params.palette]);
  const bgR  = params.bgDark ? 18  : 242;
  const bgG  = params.bgDark ? 18  : 242;
  const bgB  = params.bgDark ? 28  : 250;

  const sketch = `
const PALETTE  = ${pal};
const MODE     = '${params.mode}';
const SHAPE    = '${params.shape}';
const DENSITY  = ${params.density};
const SPEED    = ${params.speed};
const SZ       = ${params.size};

let particles = [];

function setup() {
  createCanvas(windowWidth, windowHeight);
  angleMode(RADIANS);
  if (MODE === 'particle') initParticles();
}

function draw() {
  background(${bgR}, ${bgG}, ${bgB});
  MODE === 'geometric' ? drawGeometric() : drawParticles();
}

function initParticles() {
  particles = [];
  for (let i = 0; i < DENSITY; i++) {
    particles.push({
      x: random(width), y: random(height),
      vx: random(-0.5, 0.5) + (Math.random() < 0.5 ? 1 : -1),
      vy: random(-0.5, 0.5) + (Math.random() < 0.5 ? 1 : -1),
      ci: floor(random(PALETTE.length)),
      phase: random(TWO_PI)
    });
  }
}

function drawGeometric() {
  const cols = max(1, round(sqrt(DENSITY)));
  const sx   = width  / (cols + 1);
  const sy   = height / (cols + 1);
  noStroke();
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < cols; j++) {
      const phase = (i * cols + j) * 0.4;
      const s     = SZ * (0.55 + 0.45 * sin(frameCount * SPEED * 0.018 + phase));
      fill(PALETTE[(i + j) % PALETTE.length]);
      push();
      translate(sx * (i + 1), sy * (j + 1));
      rotate(frameCount * SPEED * 0.01 + phase);
      drawShape(s);
      pop();
    }
  }
}

function drawParticles() {
  const spd = SPEED * 0.35;
  noStroke();
  for (const pt of particles) {
    pt.x += pt.vx * spd;
    pt.y += pt.vy * spd;
    if (pt.x < 0)       pt.x = width;
    if (pt.x > width)   pt.x = 0;
    if (pt.y < 0)       pt.y = height;
    if (pt.y > height)  pt.y = 0;
    const s = SZ * (0.65 + 0.35 * sin(frameCount * 0.04 + pt.phase));
    fill(PALETTE[pt.ci % PALETTE.length]);
    push();
    translate(pt.x, pt.y);
    rotate(frameCount * SPEED * 0.012 + pt.phase);
    drawShape(s);
    pop();
  }
}

function drawShape(s) {
  if (SHAPE === 'circle') {
    ellipse(0, 0, s, s);
  } else if (SHAPE === 'square') {
    rectMode(CENTER);
    rect(0, 0, s, s);
  } else {
    const h = s * 0.866;
    triangle(0, -h * 0.67, s * 0.5, h * 0.33, -s * 0.5, h * 0.33);
  }
}
`.trim();

  const html = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generated Pattern</title>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: rgb(${bgR},${bgG},${bgB}); }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"><\/script>
  <script>
${sketch}
  <\/script>
</body>
</html>`;

  const blob = new Blob([html], { type: 'text/html' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = 'pattern.html';
  a.click();
  URL.revokeObjectURL(a.href);
}
</script>

</body>
</html>
